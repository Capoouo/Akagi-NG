codecov:
  require_ci_to_pass: true
  notify:
    wait_for_ci: true

coverage:
  precision: 2
  round: down
  range: 70...100

  status:
    project:
      default:
        target: auto
        threshold: 1%
        if_ci_failed: error
        informational: false

    patch:
      default:
        target: 80%
        threshold: 5%
        if_ci_failed: error
        informational: false

flags:
  backend:
    paths:
      - akagi_backend/akagi_ng/

fixes:
  - 'akagi_ng/::akagi_backend/akagi_ng/'

comment:
  layout: diff,flags,files,footer
  behavior: default
  require_changes: false
  require_base: false
  require_head: true

ignore:
  - scripts/
  - tests/
  - '**/test_*.py'
  - '**/__init__.py'
  - '**/__main__.py'
  - '.venv/'
  - '*.egg-info/'
  - build/
  - dist/

github_checks:
  annotations: true
